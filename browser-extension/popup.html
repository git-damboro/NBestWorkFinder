<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>NBestWorkFinder 辅助投递</title>
    <style>
      :root {
        color-scheme: light;
        --text: #0f172a;
        --muted: #64748b;
        --line: #dbe3ef;
        --panel: #ffffff;
        --soft: #f1f5f9;
        --brand: #10b981;
        --brand-dark: #059669;
      }

      body {
        width: 340px;
        margin: 0;
        padding: 16px;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, 0.18), transparent 34%),
          #f8fafc;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .card {
        margin-top: 14px;
        border: 1px solid rgba(219, 227, 239, 0.9);
        border-radius: 18px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
      }

      label {
        display: block;
        margin-top: 12px;
        color: #334155;
        font-size: 12px;
        font-weight: 700;
      }

      input,
      textarea {
        box-sizing: border-box;
        width: 100%;
        margin-top: 6px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 9px 10px;
        color: var(--text);
        font-size: 12px;
        outline: none;
        background: #fff;
      }

      textarea {
        min-height: 64px;
        resize: vertical;
      }

      button {
        width: 100%;
        margin-top: 12px;
        border: 0;
        border-radius: 14px;
        padding: 11px 12px;
        color: white;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
        background: var(--brand);
      }

      button:hover {
        background: var(--brand-dark);
      }

      button.secondary {
        color: var(--text);
        background: #e2e8f0;
      }

      button.secondary:hover {
        background: #cbd5e1;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      details {
        margin-top: 12px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }

      summary {
        cursor: pointer;
        color: #475569;
        font-size: 13px;
        font-weight: 700;
      }

      .status {
        margin-top: 12px;
        border-radius: 14px;
        padding: 10px;
        font-size: 13px;
        line-height: 1.6;
        background: var(--panel);
        white-space: pre-wrap;
      }

      .success {
        color: #047857;
        background: #ecfdf5;
      }

      .error {
        color: #b91c1c;
        background: #fef2f2;
      }

      .preview {
        display: none;
        margin-top: 12px;
        border: 1px solid #bbf7d0;
        border-radius: 16px;
        padding: 12px;
        background: #f0fdf4;
      }

      .preview.visible {
        display: block;
      }

      .preview h2 {
        margin: 0;
        font-size: 14px;
      }

      .preview dl {
        margin: 10px 0 0;
      }

      .preview dt {
        margin-top: 8px;
        color: #64748b;
        font-size: 12px;
        font-weight: 700;
      }

      .preview dd {
        margin: 3px 0 0;
        color: #0f172a;
        font-size: 13px;
        line-height: 1.45;
        word-break: break-word;
      }

      .preview-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .preview-actions button {
        margin-top: 0;
        padding: 9px 10px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>NBestWorkFinder 辅助投递</h1>
    <p>打开 BOSS 岗位页后，一键采集岗位并进入系统复制开场白。</p>

    <div class="card">
      <button id="importJob">采集岗位并准备投递</button>
      <button id="openApp" class="secondary">打开职位工作台</button>

      <div id="jobPreview" class="preview" aria-live="polite">
        <h2>确认导入信息</h2>
        <dl>
          <dt>职位</dt>
          <dd id="previewTitle">-</dd>
          <dt>公司</dt>
          <dd id="previewCompany">-</dd>
          <dt>薪资</dt>
          <dd id="previewSalary">-</dd>
          <dt>描述</dt>
          <dd id="previewDescription">-</dd>
          <dt>标签</dt>
          <dd id="previewTags">-</dd>
        </dl>
        <div class="preview-actions">
          <button id="confirmImport">确认导入</button>
          <button id="cancelPreview" class="secondary">取消预览</button>
        </div>
      </div>

      <details>
        <summary>设置与登录态</summary>

        <label for="apiBase">后端地址</label>
        <input id="apiBase" value="http://localhost:8080" />

        <label for="frontendBase">前端地址</label>
        <input id="frontendBase" value="http://localhost:5173" />

        <label for="accessToken">登录 Token</label>
        <textarea id="accessToken" placeholder="通常不需要手动填写，点击下方按钮从已登录前端读取"></textarea>

        <button id="loadToken" class="secondary">从已登录前端读取 Token</button>
        <button id="saveConfig" class="secondary">保存配置</button>
      </details>

      <div id="status" class="status">等待操作</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
