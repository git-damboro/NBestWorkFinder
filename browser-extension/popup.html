<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>NBestWorkFinder 辅助投递</title>
    <style>
      body {
        width: 360px;
        margin: 0;
        padding: 16px;
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      p {
        margin: 8px 0 0;
        color: #64748b;
        font-size: 13px;
        line-height: 1.6;
      }

      label {
        display: block;
        margin-top: 14px;
        color: #334155;
        font-size: 13px;
        font-weight: 600;
      }

      input,
      textarea {
        box-sizing: border-box;
        width: 100%;
        margin-top: 6px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 9px 10px;
        color: #0f172a;
        font-size: 13px;
        outline: none;
        background: #fff;
      }

      textarea {
        min-height: 72px;
        resize: vertical;
      }

      button {
        width: 100%;
        margin-top: 14px;
        border: 0;
        border-radius: 12px;
        padding: 10px 12px;
        color: white;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        background: #10b981;
      }

      button.secondary {
        color: #0f172a;
        background: #e2e8f0;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .status {
        margin-top: 12px;
        border-radius: 12px;
        padding: 10px;
        font-size: 13px;
        line-height: 1.6;
        background: #fff;
      }

      .success {
        color: #047857;
        background: #ecfdf5;
      }

      .error {
        color: #b91c1c;
        background: #fef2f2;
      }
    </style>
  </head>
  <body>
    <h1>NBestWorkFinder 辅助投递</h1>
    <p>第一版支持 Chrome/Edge，优先识别 BOSS 直聘岗位页。导入前请确保本地后端已启动。</p>

    <label for="apiBase">后端地址</label>
    <input id="apiBase" value="http://localhost:8080" />

    <label for="frontendBase">前端地址</label>
    <input id="frontendBase" value="http://localhost:5173" />

    <label for="accessToken">登录 Token</label>
    <textarea id="accessToken" placeholder="从系统登录态中复制 accessToken 后粘贴到这里"></textarea>

    <button id="saveConfig" class="secondary">保存配置</button>
    <button id="importJob">采集并导入当前岗位</button>
    <button id="openApp" class="secondary">打开职位工作台</button>

    <div id="status" class="status">等待操作。</div>

    <script src="popup.js"></script>
  </body>
</html>
